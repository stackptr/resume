name: Release

on:
  push:
    branches: main

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        run: |
          nix build .#resume 
          cp -L result resume.pdf
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: resume.pdf
