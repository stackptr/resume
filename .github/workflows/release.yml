name: Release

on:
  push:
    branches: main
    
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            extra-substituters = https://cache.zx.dev/main
            extra-trusted-public-keys = main:mu0jkxdJTGWC3djDSEQb3rvZgqlhA8WVMulcTo5IW6c=
      - name: Setup Attic
        run: |
          nix profile install --inputs-from . nixpkgs#attic-client
          attic login rc https://cache.zx.dev ${{ secrets.ATTIC_TOKEN }}
          attic use rc:main
      - name: Build
        run: |
          nix build .#resume
          cp -L result resume.pdf
      - name: Push to Attic
        if: github.ref == 'refs/heads/main'
        run: attic push rc:main ./result
      - name: Create Tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a "v0.0.${{ github.run_number }}" -m "Release v0.0.${{ github.run_number }}"
          git push origin "v0.0.${{ github.run_number }}"
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.0.${{ github.run_number }}
          files: resume.pdf
      - name: Update latest tag
        run: |
          git tag -f latest
          git push -f origin latest
      - name: Update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          files: resume.pdf
          make_latest: false
